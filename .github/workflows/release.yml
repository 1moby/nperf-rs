name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY: nperf-rs

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-amd64
            cross: false
            upx: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-arm64
            cross: true
            upx: false
          - target: x86_64-apple-darwin
            os: macos-14
            name: macos-intel
            cross: false
            upx: false
          - target: aarch64-apple-darwin
            os: macos-14
            name: macos-arm64
            cross: false
            upx: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-amd64
            ext: .exe
            cross: false
            upx: true
          - target: i686-pc-windows-msvc
            os: windows-latest
            name: windows-x86
            ext: .exe
            cross: false
            upx: true
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: windows-arm64
            ext: .exe
            cross: false
            upx: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux amd64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (Linux arm64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        env:
          TARGET: ${{ matrix.target }}
        run: cross build --release --target "$TARGET"

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"

      - name: Install UPX (Linux)
        if: matrix.upx && runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      - name: Install UPX (Windows)
        if: matrix.upx && runner.os == 'Windows'
        run: choco install upx -y

      - name: Compress with UPX
        if: matrix.upx
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        run: upx --best --lzma "target/${TARGET}/release/${BINARY}${EXT}"
        continue-on-error: true

      - name: Rename binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          NAME: ${{ matrix.name }}
          EXT: ${{ matrix.ext }}
        run: |
          src="target/${TARGET}/release/${BINARY}${EXT}"
          dst="${BINARY}-${NAME}${EXT}"
          cp "$src" "$dst"
          echo "ASSET=$dst" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}-${{ matrix.name }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
